<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтвердите email — Копилка</title>
</head>
<body style="margin:0; padding:0; background:#f5f5f7; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f7; padding:32px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:20px; padding:40px; max-width:480px; width:90%;">
        <tr>
          <td align="center" style="padding-bottom:16px;">
            <div style="width:56px; height:56px; border-radius:14px; background:#433DCB; font-size:28px; line-height:56px; text-align:center;">🐷</div>
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:20px; font-weight:800; color:#433DCB; padding-bottom:24px;">Копилка</td>
        </tr>
        <tr>
          <td style="font-size:22px; font-weight:800; color:#1d1d1f; padding-bottom:12px;" align="center">Подтвердите ваш email</td>
        </tr>
        <tr>
          <td style="font-size:15px; color:#3d3d3f; line-height:1.6; padding-bottom:28px;" align="center">
            Спасибо за регистрацию в Копилке! Чтобы завершить создание аккаунта, подтвердите свой адрес электронной почты.
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-bottom:28px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block; padding:14px 32px; border-radius:12px; background:#433DCB; color:#ffffff; text-decoration:none; font-weight:700; font-size:15px;">Подтвердить email</a>
          </td>
        </tr>
        <tr>
          <td style="font-size:13px; color:#a0a0a5; padding-top:12px; border-top:1px solid #e5e5ea;" align="center">
            Если вы не регистрировались в Копилке, просто проигнорируйте это письмо.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
