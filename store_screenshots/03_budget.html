<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 390px; height: 844px; background: #F0F0F5; font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; position: relative; }

  .appbar {
    background: white; padding: 56px 20px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .appbar-title { font-size: 22px; font-weight: 800; color: #1A1A2E; }
  .appbar-month { font-size: 15px; color: #433DCB; font-weight: 600; }

  .total-card {
    margin: 12px 16px;
    background: white; border-radius: 18px; padding: 18px 18px 16px;
  }
  .total-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .total-left .label { font-size: 12px; color: #9E9EB0; margin-bottom: 4px; }
  .total-left .val { font-size: 22px; font-weight: 800; color: #1A1A2E; }
  .total-right { text-align: right; }
  .total-right .label { font-size: 12px; color: #9E9EB0; margin-bottom: 4px; }
  .total-right .val { font-size: 22px; font-weight: 800; color: #27AE60; }
  .progress-bg { background: #EEF; border-radius: 6px; height: 8px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #433DCB, #7B73E4); height: 100%; border-radius: 6px; }
  .progress-sub { font-size: 11px; color: #9E9EB0; margin-top: 6px; }

  .budgets { padding: 4px 16px; display: flex; flex-direction: column; gap: 10px; }
  .budget-card {
    background: white; border-radius: 16px; padding: 14px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .b-icon {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .b-info { flex: 1; }
  .b-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .b-name { font-size: 14px; font-weight: 600; color: #1A1A2E; }
  .b-over { font-size: 10px; background: #FDECEA; color: #E74C3C; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
  .pb { background: #EEF; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 5px; }
  .pb-fill { height: 100%; border-radius: 4px; }
  .b-amounts { display: flex; justify-content: space-between; font-size: 11px; color: #9E9EB0; }

  .tagline {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #433DCB;
    padding: 20px 24px 36px;
    text-align: center;
  }
  .tagline h2 { color: white; font-size: 19px; font-weight: 800; line-height: 1.3; }
  .tagline p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<div class="appbar">
  <div class="appbar-title">Бюджет</div>
  <div class="appbar-month">Июнь 2026</div>
</div>

<div class="total-card">
  <div class="total-row">
    <div class="total-left">
      <div class="label">Общий бюджет</div>
      <div class="val">58 000 ₽</div>
    </div>
    <div class="total-right">
      <div class="label">Осталось</div>
      <div class="val">+10 170 ₽</div>
    </div>
  </div>
  <div class="progress-bg">
    <div class="progress-fill" style="width: 82%;"></div>
  </div>
  <div class="progress-sub">Потрачено 47 830 ₽ из 58 000 ₽</div>
</div>

<div class="budgets">
  <div class="budget-card">
    <div class="b-icon" style="background:#FFF3E0;">🛒</div>
    <div class="b-info">
      <div class="b-row">
        <span class="b-name">Продукты</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:48%; background:#433DCB;"></div></div>
      <div class="b-amounts"><span>12 000 ₽</span><span>25 000 ₽</span></div>
    </div>
  </div>

  <div class="budget-card">
    <div class="b-icon" style="background:#FCE4EC;">☕</div>
    <div class="b-info">
      <div class="b-row">
        <span class="b-name">Кафе и рестораны</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:64%; background:#433DCB;"></div></div>
      <div class="b-amounts"><span>6 400 ₽</span><span>10 000 ₽</span></div>
    </div>
  </div>

  <div class="budget-card">
    <div class="b-icon" style="background:#E8F5E9;">⛽</div>
    <div class="b-info">
      <div class="b-row">
        <span class="b-name">Транспорт</span>
        <span class="b-over">Перерасход</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:100%; background:#E74C3C;"></div></div>
      <div class="b-amounts"><span>13 430 ₽</span><span>10 000 ₽</span></div>
    </div>
  </div>

  <div class="budget-card">
    <div class="b-icon" style="background:#E8EAF6;">💊</div>
    <div class="b-info">
      <div class="b-row">
        <span class="b-name">Здоровье</span>
      </div>
      <div class="pb"><div class="pb-fill" style="width:16%; background:#433DCB;"></div></div>
      <div class="b-amounts"><span>2 100 ₽</span><span>13 000 ₽</span></div>
    </div>
  </div>
</div>

<div class="tagline">
  <h2>Не выходи за рамки бюджета</h2>
  <p>Планируй расходы по категориям на каждый месяц</p>
</div>

</body>
</html>
