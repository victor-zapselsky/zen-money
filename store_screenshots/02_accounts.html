<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 390px; height: 844px; background: #F0F0F5; font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; position: relative; }

  .appbar {
    background: white; padding: 56px 20px 14px;
    font-size: 22px; font-weight: 800; color: #1A1A2E;
  }

  .total-card {
    margin: 12px 16px;
    background: linear-gradient(135deg, #433DCB 0%, #6B5FE4 100%);
    border-radius: 20px; padding: 22px 22px 20px;
    color: white;
  }
  .total-card .label { font-size: 13px; opacity: 0.75; margin-bottom: 8px; }
  .total-card .amount { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }

  .accounts { padding: 4px 16px; display: flex; flex-direction: column; gap: 10px; }

  .acc-card {
    background: white; border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .acc-icon {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .acc-info { flex: 1; }
  .acc-name { font-size: 15px; font-weight: 600; color: #1A1A2E; }
  .acc-type { font-size: 12px; color: #9E9EB0; margin-top: 2px; }
  .acc-balance { font-size: 16px; font-weight: 700; color: #1A1A2E; }

  .tagline {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #433DCB;
    padding: 20px 24px 36px;
    text-align: center;
  }
  .tagline h2 { color: white; font-size: 19px; font-weight: 800; line-height: 1.3; }
  .tagline p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<div class="appbar">Счета</div>

<div class="total-card">
  <div class="label">Общий баланс</div>
  <div class="amount">217 000 ₽</div>
</div>

<div class="accounts">
  <div class="acc-card">
    <div class="acc-icon" style="background:#E8EAF6; color:#433DCB;">С</div>
    <div class="acc-info">
      <div class="acc-name">Карта Сбербанк</div>
      <div class="acc-type">Дебетовая</div>
    </div>
    <div class="acc-balance">85 000 ₽</div>
  </div>

  <div class="acc-card">
    <div class="acc-icon" style="background:#E8F5E9; color:#27AE60;">Т</div>
    <div class="acc-info">
      <div class="acc-name">Тинькофф</div>
      <div class="acc-type">Дебетовая</div>
    </div>
    <div class="acc-balance">120 000 ₽</div>
  </div>

  <div class="acc-card">
    <div class="acc-icon" style="background:#FFF3E0; color:#E67E22;">Н</div>
    <div class="acc-info">
      <div class="acc-name">Наличные</div>
      <div class="acc-type">Кошелёк</div>
    </div>
    <div class="acc-balance">12 000 ₽</div>
  </div>

  <div class="acc-card">
    <div class="acc-icon" style="background:#FCE4EC; color:#E91E63;">В</div>
    <div class="acc-info">
      <div class="acc-name">Вклад</div>
      <div class="acc-type">Накопления</div>
    </div>
    <div class="acc-balance">0 ₽</div>
  </div>
</div>

<div class="tagline">
  <h2>Все счета в одном месте</h2>
  <p>Карты, наличные и накопления — всегда под рукой</p>
</div>

</body>
</html>
