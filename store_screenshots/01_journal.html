<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 390px; height: 844px; background: #F0F0F5; font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; position: relative; }

  .hero {
    background: linear-gradient(160deg, #433DCB 0%, #6B5FE4 100%);
    padding: 56px 24px 32px;
    color: white;
  }
  .hero-label { font-size: 13px; opacity: 0.75; margin-bottom: 6px; letter-spacing: 0.3px; }
  .hero-amount { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
  .hero-sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }

  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 0;
  }
  .month-nav span { font-size: 15px; font-weight: 700; color: #433DCB; }
  .month-nav .arr { font-size: 18px; color: #433DCB; font-weight: 600; }

  .summary-row {
    display: flex; gap: 10px; padding: 12px 16px;
  }
  .summary-card {
    flex: 1; background: white; border-radius: 14px; padding: 12px 14px;
  }
  .summary-card .label { font-size: 11px; color: #9E9EB0; margin-bottom: 4px; }
  .summary-card .val { font-size: 17px; font-weight: 700; }
  .summary-card .val.inc { color: #27AE60; }
  .summary-card .val.exp { color: #E74C3C; }

  .section-title { padding: 4px 16px 8px; font-size: 12px; font-weight: 700; color: #9E9EB0; letter-spacing: 0.6px; text-transform: uppercase; }

  .tx-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .tx {
    background: white; border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .tx-icon {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .tx-icon.food { background: #FFF3E0; }
  .tx-icon.car { background: #E8F5E9; }
  .tx-icon.cafe { background: #FCE4EC; }
  .tx-icon.salary { background: #E8EAF6; }
  .tx-icon.shop { background: #F3E5F5; }
  .tx-info { flex: 1; }
  .tx-name { font-size: 14px; font-weight: 600; color: #1A1A2E; }
  .tx-acc { font-size: 12px; color: #9E9EB0; margin-top: 2px; }
  .tx-amount { font-size: 15px; font-weight: 700; }
  .tx-amount.exp { color: #E74C3C; }
  .tx-amount.inc { color: #27AE60; }

  .tagline {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #433DCB;
    padding: 20px 24px 36px;
    text-align: center;
  }
  .tagline h2 { color: white; font-size: 19px; font-weight: 800; line-height: 1.3; }
  .tagline p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">Расходы за июнь</div>
  <div class="hero-amount">−47 830 ₽</div>
  <div class="hero-sub">Доходы: +120 000 ₽</div>
</div>

<div class="month-nav">
  <span class="arr">‹</span>
  <span>Июнь 2026</span>
  <span class="arr">›</span>
</div>

<div class="summary-row">
  <div class="summary-card">
    <div class="label">Доходы</div>
    <div class="val inc">+120 000 ₽</div>
  </div>
  <div class="summary-card">
    <div class="label">Расходы</div>
    <div class="val exp">−47 830 ₽</div>
  </div>
</div>

<div class="section-title">Сегодня</div>

<div class="tx-list">
  <div class="tx">
    <div class="tx-icon food">🛒</div>
    <div class="tx-info">
      <div class="tx-name">Продукты</div>
      <div class="tx-acc">Карта Сбербанк</div>
    </div>
    <div class="tx-amount exp">−2 340 ₽</div>
  </div>
  <div class="tx">
    <div class="tx-icon cafe">☕</div>
    <div class="tx-info">
      <div class="tx-name">Кафе</div>
      <div class="tx-acc">Наличные</div>
    </div>
    <div class="tx-amount exp">−640 ₽</div>
  </div>
  <div class="tx">
    <div class="tx-icon salary">💼</div>
    <div class="tx-info">
      <div class="tx-name">Зарплата</div>
      <div class="tx-acc">Дебетовая карта</div>
    </div>
    <div class="tx-amount inc">+120 000 ₽</div>
  </div>
  <div class="tx">
    <div class="tx-icon car">⛽</div>
    <div class="tx-info">
      <div class="tx-name">Бензин</div>
      <div class="tx-acc">Карта Сбербанк</div>
    </div>
    <div class="tx-amount exp">−3 200 ₽</div>
  </div>
</div>

<div class="tagline">
  <h2>Все траты — как на ладони</h2>
  <p>Записывай доходы и расходы за секунды</p>
</div>

</body>
</html>
