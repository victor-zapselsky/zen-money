<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 390px; height: 844px; background: #F0F0F5; font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; position: relative; }

  .top-bg {
    background: linear-gradient(160deg, #433DCB 0%, #7B73E4 100%);
    padding: 60px 24px 40px;
    text-align: center;
  }
  .avatar-wrap { position: relative; display: inline-block; margin-bottom: 14px; }
  .avatar {
    width: 86px; height: 86px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 3px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; color: white;
    margin: 0 auto;
  }
  .avatar-edit {
    position: absolute; bottom: 0; right: 0;
    width: 26px; height: 26px; border-radius: 50%;
    background: white; display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .user-name { color: white; font-size: 20px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .user-name .edit-icon { font-size: 14px; opacity: 0.7; }
  .user-email { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 4px; }

  .sync-banner {
    margin: 14px 16px;
    background: white; border-radius: 16px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .sync-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #433DCB, #7B73E4);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .sync-info { flex: 1; }
  .sync-title { font-size: 14px; font-weight: 700; color: #1A1A2E; }
  .sync-sub { font-size: 12px; color: #9E9EB0; margin-top: 2px; }
  .sync-toggle {
    width: 44px; height: 26px; border-radius: 13px;
    background: #433DCB; position: relative; flex-shrink: 0;
  }
  .sync-toggle::after {
    content: ''; position: absolute; top: 2px; right: 2px;
    width: 22px; height: 22px; border-radius: 50%; background: white;
  }

  .section {
    margin: 0 16px 10px;
    background: white; border-radius: 16px; overflow: hidden;
  }
  .section-header {
    padding: 12px 16px 6px;
    font-size: 11px; font-weight: 700; color: #9E9EB0; letter-spacing: 0.7px; text-transform: uppercase;
  }
  .row {
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
    border-top: 1px solid #F0F0F5;
  }
  .row:first-of-type { border-top: none; }
  .row-icon { font-size: 18px; width: 24px; text-align: center; }
  .row-label { flex: 1; font-size: 14px; color: #1A1A2E; }
  .row-trail { font-size: 13px; color: #9E9EB0; }
  .row-arr { color: #BCBCCC; font-size: 16px; }

  .tagline {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: #433DCB;
    padding: 18px 24px 36px;
    text-align: center;
  }
  .tagline h2 { color: white; font-size: 19px; font-weight: 800; line-height: 1.3; }
  .tagline p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>

<div class="top-bg">
  <div class="avatar-wrap">
    <div class="avatar">В</div>
    <div class="avatar-edit">📷</div>
  </div>
  <div class="user-name">Виктор <span class="edit-icon">✏️</span></div>
  <div class="user-email">viktor@example.com</div>
</div>

<div class="sync-banner">
  <div class="sync-icon">☁️</div>
  <div class="sync-info">
    <div class="sync-title">Облачная синхронизация</div>
    <div class="sync-sub">Синхронизировано · только что</div>
  </div>
  <div class="sync-toggle"></div>
</div>

<div class="section">
  <div class="section-header">Данные</div>
  <div class="row">
    <div class="row-icon">📤</div>
    <div class="row-label">Экспорт данных</div>
    <div class="row-arr">›</div>
  </div>
  <div class="row">
    <div class="row-icon">⭐</div>
    <div class="row-label">Оценить приложение</div>
    <div class="row-arr">›</div>
  </div>
  <div class="row">
    <div class="row-icon">✈️</div>
    <div class="row-label">Написать разработчику</div>
    <div class="row-arr">›</div>
  </div>
</div>

<div class="tagline">
  <h2>Данные всегда с тобой</h2>
  <p>Синхронизация между всеми твоими устройствами</p>
</div>

</body>
</html>
